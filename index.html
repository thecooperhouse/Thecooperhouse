<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Cooperhouse</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        p {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
        }

        .container {
            max-width: 700px;
            margin: auto;
        }

        .card {
            display: block;
            text-decoration: none;
            background: white;
            padding: 25px;
            margin: 20px 0;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
            transition: 0.2s;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 16px rgba(0,0,0,0.2);
        }

        .title {
            font-size: 24px;
            color: #222;
            font-weight: bold;
        }

        .description {
            margin-top: 8px;
            color: #666;
        }
    </style>

</head>
<body>

<div class="container">

<h1>The Cooperhouse</h1>

<p>Welcome to my collection of web tools and projects.</p>

<a class="card" href="tax/">
    <div class="title">💰 Tax Calculator</div>
    <div class="description">
        Australian tax calculator and related financial tools.
    </div>
</a>

<a class="card" href="motorsport/">
    <div class="title">🏁 Motorsport</div>
    <div class="description">
        Motorsport calculators, lap timing and race-related projects.
    </div>
</a>

</div>

</body>
</html>
